<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRON Wallet Dashboard</title>

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="toast" class="toast hidden"></div>

<div class="container">

<div class="topbar">
<button id="connectBtn" class="mainBtn">
Connect DApp
</button>
</div>

<!-- MAIN CARD -->
<div class="card">

<div class="assetRow">

<div class="assetInfo">
<img
src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/tron/info/logo.png"
class="tokenLogo"
>

<div>
<h3>TRON</h3>
<p>Current TRX Balance</p>
</div>
</div>

<div>
<h3 id="trxUsd">$0.00</h3>
</div>

</div>

<h1 id="trxBalance">0 TRX</h1>
  
<!-- SEND MODAL -->

<div id="sendModal" class="modal hidden">

<div class="modalContent">

<button id="closeSend" class="backBtn">
Back
</button>

<h2>Send Asset</h2>

<select id="sendToken" class="inputBox">

<option value="TRX">
TRX
</option>

<option value="USDT">
USDT
</option>

</select>

<input
type="text"
id="sendAddress"
class="inputBox"
placeholder="Recipient Address"
/>

<input
type="number"
id="sendAmount"
class="inputBox"
placeholder="Amount"
/>

<button id="confirmSend" class="mainBtn">
Send Now
</button>

</div>

</div>
  
<div class="buttonRow">

<button id="receiveBtn" class="actionBtn">
Receive
</button>

</div>

</div>

<!-- DEMO PENDING -->
<div id="pendingBox" class="card hidden">

<div class="assetInfo">

<img
src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/tron/assets/TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t/logo.png"
class="tokenLogo"
>

<div>
<h3>Pending USDT</h3>
<p> Pending UI</p>
</div>

</div>

<div class="pendingRow">
<div class="spinLoader"></div>
<span>Awaiting Confirmation...</span>
</div>

<button
id="viewPendingBtn"
class="mainBtn"
style="margin-top:15px;width:100%;"
>
View Details
</button>

</div>

<!-- PENDING MODAL -->
<div id="pendingModal" class="modal hidden">

<div class="modalContent">

<button id="closePending" class="backBtn">
Back
</button>

<div class="assetInfo">

<img
src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/tron/assets/TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t/logo.png"
class="tokenLogo"
>

<div>
<h2>Pending USDT</h2>
<p>Pending State</p>
</div>

</div>

<div class="pendingRow">
<div class="spinLoader"></div>
<span>Awaiting Confirmation...</span>
</div>

<p style="margin-top:20px;">
Amount: 250 USDT
</p>
<div class="senderWrap">
<span id="senderAddress">
OxAbc123. ..Manual 
</span>

<button class="copyIconBtn" onclick="copySenderAddress()">
<svg viewBox="0 0 24 24">
<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 18H8V7h11v16z"></path>
</svg>
</button>
</div>

<button class="mainBtn" onclick="confirmDeposit()">
Confirm Deposit
</button>
  
</div>

</div>

<div class="pendingRow">
<div class="spinLoader"></div>
<span>Awaiting Confirmation...</span>
</div>

</div>

<h2 class="sectionTitle">Assets</h2>
<div id="assetList"></div>

<h2 class="sectionTitle">Live Chart</h2>

<div class="card">

<p>
Open live TRON market chart
</p>

<button
id="openChartBtn"
class="mainBtn"
>
Open Chart
</button>

</div>

<h2 class="sectionTitle">Transactions</h2>
<div id="txList"></div>

</div>

<!-- RECEIVE MODAL -->
<div id="receiveModal" class="modal hidden">

<div class="modalContent">

<button id="closeReceive" class="backBtn">
Back
</button>

<h2>Receive TRX</h2>

<div class="qrWrap">
<img id="qrCode" src="">
</div>

<p id="walletAddress"></p>

<button id="copyBtn" class="mainBtn">
Copy Address
</button>

</div>

</div>

<script src="tokens.js"></script>
<script src="wallet.js"></script>
<script src="transactions.js"></script>
<script src="modals.js"></script>
<script src="app.js"></script>

</body>
</html>
