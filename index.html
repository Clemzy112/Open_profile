<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRON Wallet Dashboard</title>

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="toast" class="toast hidden"></div>

<div class="container">

<div class="topbar">
<button id="connectBtn" class="mainBtn">
Connect DApp
</button>
</div>

<!-- MAIN CARD -->
<div class="card">

<div class="assetRow">

<div class="assetInfo">
<img
src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/tron/info/logo.png"
class="tokenLogo"
>

<div>
<h3>TRON</h3>
<p>Current TRX Balance</p>
</div>
</div>

<div>
<h3 id="trxUsd">$0.00</h3>
</div>

</div>

<h1 id="trxBalance">0 TRX</h1>
  
<div class="buttonRow">

<button id="receiveBtn" class="actionBtn">
Receive
</button>

</div>

</div>

<h2 class="sectionTitle">Assets</h2>
<div id="assetList"></div>

<h2 class="sectionTitle">Live Chart</h2>

<div class="card">

<p>
Open live TRON market chart
</p>

<button
id="openChartBtn"
class="mainBtn"
>
Open Chart
</button>

</div>

<h2 class="sectionTitle">Transactions</h2>
<div id="txList"></div>

</div>

<!-- RECEIVE MODAL -->
<div id="receiveModal" class="modal hidden">

<div class="modalContent">

<button id="closeReceive" class="backBtn">
Back
</button>

<h2>Receive TRX</h2>

<div class="qrWrap">
<img id="qrCode" src="">
</div>

<p id="walletAddress"></p>

<button id="copyBtn" class="mainBtn">
Copy Address
</button>

</div>

</div>

<script src="tokens.js"></script>
<script src="wallet.js"></script>
<script src="transactions.js"></script>
<script src="modals.js"></script>
<script src="app.js"></script>

</body>
</html>
